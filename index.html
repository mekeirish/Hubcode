<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hubcode - Repository Manager</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { 
            --bg: #1e1e22; 
            --card-bg: #1e1e22; 
            --shadow-dark: #111113; 
            --shadow-light: #2b2b31; 
            --accent: #ffca28; 
            --text: #c9d1d9; 
            --danger: #f85149; 
            --success: #7ee787; 
            --blue: #58a6ff;
            --orange: #ffa726;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            padding: 15px; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); 
            border: none; 
            margin-bottom: 20px; 
        }
        
        h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-top: 0; }
        
        input { 
            width: 100%; 
            margin: 8px 0; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: var(--bg); 
            color: white; 
            box-sizing: border-box; 
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); 
            outline: none;
            font-size: 13px;
        }

        .search-box {
            margin: 12px 0 4px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            left: 20px; 
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
            pointer-events: none; 
        }

        @media (min-width: 440px) {
            .toast-container {
                left: auto;
                width: 360px;
            }
        }

        .internal-toast {
            pointer-events: auto; 
            background: linear-gradient(135deg, #16161a, #111113);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            padding: 14px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 2px 2px 4px var(--shadow-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .internal-toast.success-toast { border-left-color: var(--success); }
        .internal-toast.danger-toast { border-left-color: var(--danger); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        button.btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 8px; 
            transition: all 0.1s ease; 
            background: linear-gradient(135deg, #2b2b31, #1b1b1f); 
            box-shadow: 4px 4px 8px var(--shadow-dark), 
                        -4px -4px 8px var(--shadow-light),
                        inset 1px 1px 1px rgba(255, 255, 255, 0.1); 
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }
        
        button.btn:active { 
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light); 
            transform: translateY(1px); 
        }
        
        .yellow-btn { color: var(--accent); border-bottom: 2px solid rgba(255, 202, 40, 0.2) !important; }
        .red-btn { color: var(--danger); border-bottom: 2px solid rgba(248, 81, 73, 0.2) !important; }
        
        .repo-list {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .repo-item {
            background: var(--card-bg);
            padding: 14px;
            border-radius: 14px;
            box-shadow: 4px 4px 8px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .repo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
            color: #fff;
        }
        
        .repo-actions-row {
            display: flex;
            gap: 4px;
            width: 100%;
            padding-bottom: 4px;
        }
        
        .action-btn {
            flex: 1;
            min-width: 0; 
            padding: 11px 2px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            background: linear-gradient(135deg, #26262b, #16161a);
            color: var(--text);
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 2px 2px 4px var(--shadow-dark), 
                        -1px -1px 2px var(--shadow-light),
                        inset 1px 1px 0px rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: all 0.05s ease;
        }
        
        .action-btn:active {
            box-shadow: inset 2px 2px 4px var(--shadow-dark);
            transform: translateY(1px);
        }
        
        .action-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
            filter: grayscale(0.1);
        }

        .btn-html { color: var(--blue); border-bottom: 2px solid rgba(88, 166, 255, 0.3); }
        .btn-json { color: var(--accent); border-bottom: 2px solid rgba(255, 202, 40, 0.3); }
        .btn-sw { color: var(--success); border-bottom: 2px solid rgba(126, 231, 135, 0.3); }
        .btn-view { color: #fff; background: linear-gradient(135deg, #4a4a54, #2a2a30); border-bottom: 2px solid rgba(255, 255, 255, 0.2); }
        .btn-back { color: var(--orange); border-bottom: 2px solid rgba(255, 167, 38, 0.3); }
        .btn-sup { color: var(--danger); border-bottom: 2px solid rgba(248, 81, 73, 0.3); }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .dot-idle { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-active { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: blink 0.8s infinite alternate; }
        
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }
        
        .confirm-panel {
            background: #1a1a1d;
            border: 1px solid var(--danger);
            border-radius: 12px;
            padding: 12px;
            margin-top: 8px;
            display: none;
            flex-direction: column;
            gap: 8px;
            text-align: center;
            font-size: 12px;
        }
        
        .confirm-buttons {
            display: flex;
            gap: 10px;
        }
        
        .confirm-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 7px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            box-shadow: 2px 2px 4px var(--shadow-dark), inset 1px 1px 0px rgba(255, 255, 255, 0.1);
            transition: all 0.05s ease;
        }

        .confirm-btn:active {
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.5);
            transform: translateY(1px);
        }

        /* Tracker Terminal (intégré dans le style néomorphique) */
        .tracker-terminal {
            background: #0a0c10;
            border-radius: 12px;
            margin-top: 12px;
            padding: 10px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 10px;
            border: 1px solid rgba(255, 202, 40, 0.25);
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
            color: #c0c0d0;
            display: none;
            flex-direction: column;
            gap: 4px;
            max-height: 220px;
            overflow-y: auto;
        }

        .tracker-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a32;
            padding-bottom: 4px;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 9px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .log-line {
            padding: 3px 4px;
            border-radius: 5px;
            background: #111217;
            word-break: break-word;
            font-size: 10px;
            font-family: monospace;
            border-left: 2px solid transparent;
        }

        .log-success { color: var(--success); border-left-color: var(--success); }
        .log-error { color: var(--danger); border-left-color: var(--danger); }
        .log-step { color: var(--blue); border-left-color: var(--blue); }
        .log-warning { color: var(--orange); border-left-color: var(--orange); }

        .spinner-small {
            display: inline-block;
            width: 9px;
            height: 9px;
            border: 1.5px solid rgba(255,202,40,0.3);
            border-top: 1.5px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-left: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .signature {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: auto;
            padding-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>

<body>

<div id="toastContainer" class="toast-container"></div>

<div class="card">
    <h2>Hubcode</h2>
    <input type="password" id="githubToken" placeholder="Entre ton GitHub Token secret...">
    <button class="btn yellow-btn" onclick="playHum60Hz(); fetchRepositories()">🔄 CHARGER LES DÉPÔTS</button>
</div>

<div class="card" style="flex: 1;">
    <div style="display: flex; align-items: center; justify-content: space-between;">
        <span style="font-size: 0.75rem; text-transform: uppercase; color: #888; letter-spacing: 1px;">Liste des projets</span>
        <div style="display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666;">
            <span class="status-dot dot-idle" id="globalStatus"></span> <span id="statusText">PRÊT</span>
        </div>
    </div>

    <input type="text" id="repoSearch" class="search-box" placeholder="🔍 Rechercher un dépôt..." oninput="filterRepositories()">
    
    <div class="repo-list" id="repoListContainer">
        </div>
</div>

<div class="signature">Made by Brahim Laiche 2026 Paris</div>

<script>
    let allRepositories = [];
    let audioCtx = null;

    // ---------- CONVERSIONS UTF-8 / BASE64 FIABLES ----------
    function b64ToUtf8(b64) {
        try {
            const binary = atob(b64.replace(/\s/g, ''));
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        } catch(e) {
            return decodeURIComponent(escape(atob(b64.replace(/\s/g, ''))));
        }
    }
    function utf8ToB64(str) {
        try {
            const bytes = new TextEncoder().encode(str);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        } catch(e) {
            return btoa(unescape(encodeURIComponent(str)));
        }
    }
    function normalize(s) { return s.replace(/\r\n/g, '\n').trim(); }

    // ---------- SON 60Hz ----------
    function playHum60Hz() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 60;
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } catch(e) { console.warn(e); }
    }

    // ---------- NOTIFICATIONS ----------
    function showNotification(msg, type='success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `internal-toast ${type}-toast`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(10px) scale(0.95)';
            setTimeout(() => toast.remove(), 250);
        }, 3500);
    }

    window.onload = () => {
        const saved = localStorage.getItem('hubcode_token');
        if (saved) document.getElementById('githubToken').value = saved;
    };

    function setActivityState(active, msg="") {
        const dot = document.getElementById('globalStatus');
        const text = document.getElementById('statusText');
        if(active) {
            dot.className = "status-dot dot-active";
            text.innerText = msg || "TRAITEMENT...";
            text.style.color = "var(--accent)";
        } else {
            dot.className = "status-dot dot-idle";
            text.innerText = "PRÊT";
            text.style.color = "#666";
        }
    }

    // ---------- RÉCUPÉRATION DES REPOS (tri temporel : plus récent en premier) ----------
    async function fetchRepositories() {
        const token = document.getElementById('githubToken').value.trim();
        if(!token) { showNotification("Token requis", "danger"); return; }
        localStorage.setItem('hubcode_token', token);
        setActivityState(true, "CHARGEMENT...");
        try {
            const response = await fetch('https://api.github.com/user/repos?per_page=100&sort=updated&direction=desc', {
                headers: { 'Authorization': `token ${token}` }
            });
            if(!response.ok) throw new Error("Impossible de récupérer les dépôts");
            allRepositories = await response.json();
            // Le tri est déjà fait par l'API grâce à sort=updated&direction=desc
            document.getElementById('repoSearch').value = "";
            renderRepos(allRepositories);
        } catch(err) {
            showNotification(err.message, "danger");
        } finally {
            setActivityState(false);
        }
    }

    function filterRepositories() {
        const q = document.getElementById('repoSearch').value.toLowerCase();
        const filtered = allRepositories.filter(r => r.name.toLowerCase().includes(q));
        renderRepos(filtered);
    }

    // ---------- TRACKER (logs) ----------
    function getTracker(repoName) {
        let el = document.getElementById(`tracker-${repoName}`);
        if (!el) {
            const repoDiv = document.getElementById(`repo-${repoName}`);
            if (repoDiv) {
                const newTracker = document.createElement('div');
                newTracker.id = `tracker-${repoName}`;
                newTracker.className = 'tracker-terminal';
                newTracker.innerHTML = `<div class="tracker-header"><span>⛁ ROLLBACK LOGS</span><span>⚡ temps réel</span></div>`;
                repoDiv.appendChild(newTracker);
                el = newTracker;
            }
        }
        return el;
    }

    function showTracker(repoName) { const t = getTracker(repoName); if(t) t.style.display = "flex"; }
    function clearTracker(repoName) { const t = getTracker(repoName); if(t) t.innerHTML = `<div class="tracker-header"><span>⛁ ROLLBACK LOGS</span><span>⚡ temps réel</span></div>`; }
    function addLog(repoName, message, status = "step") {
        const t = getTracker(repoName);
        if (!t) return;
        const line = document.createElement('div');
        line.className = `log-line log-${status === 'error' ? 'error' : (status === 'success' ? 'success' : (status === 'warning' ? 'warning' : 'step'))}`;
        const time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        let sym = status === 'success' ? '✓' : (status === 'error' ? '✗' : (status === 'loading' ? '⟳' : '▶'));
        line.innerHTML = `<span style="color:#888;">[${time}]</span> ${sym} ${message}`;
        if (status === 'loading') line.innerHTML += `<span class="spinner-small"></span>`;
        t.appendChild(line);
        t.scrollTop = t.scrollHeight;
    }
    function disableBackBtn(repoName, disabled) { const btn = document.querySelector(`#repo-${repoName} .btn-back`); if(btn) btn.disabled = disabled; }

    // ---------- ROLLBACK COMPLET (4 fichiers PWA) ----------
    const PWA_FILES = ['index.html', 'manifest.json', 'sw.js', 'icon.png'];

    async function getFileAtCommit(owner, repo, file, commitSha, token) {
        try {
            const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}?ref=${commitSha}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (!r.ok) return null;
            const d = await r.json();
            return { content: b64ToUtf8(d.content), sha: d.sha };
        } catch { return null; }
    }

    async function getCurrentState(owner, repo, branch, token) {
        const state = {};
        for (const f of PWA_FILES) {
            try {
                const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${f}?ref=${branch}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (r.ok) {
                    const d = await r.json();
                    state[f] = { content: b64ToUtf8(d.content), sha: d.sha };
                } else if (r.status === 404) state[f] = null;
            } catch(e) { /* ignore */ }
        }
        return state;
    }

    async function restoreFile(owner, repo, file, targetContent, currentSha, branch, token, logRepo) {
        addLog(logRepo, `Restauration ${file}...`, 'loading');
        const b64 = utf8ToB64(targetContent);
        const body = { message: `Hubcode: restore ${file}`, content: b64, branch };
        if (currentSha) body.sha = currentSha;
        const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`, {
            method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        if (!r.ok) throw new Error(`Échec PUT ${file} (${r.status})`);
        addLog(logRepo, `${file} restauré ✓`, 'success');
        await new Promise(resolve => setTimeout(resolve, 1000));
        return true;
    }

    async function rollbackToCommit(owner, repo, branch, targetSha, token, logRepo) {
        addLog(logRepo, `Restauration complète vers ${targetSha.substring(0,7)}...`, 'step');
        const targetState = {};
        for (const f of PWA_FILES) {
            const fc = await getFileAtCommit(owner, repo, f, targetSha, token);
            if (fc) targetState[f] = fc.content;
            else addLog(logRepo, `${f} absent dans la cible, ignoré.`, 'warning');
        }
        if (Object.keys(targetState).length === 0) throw new Error("Aucun fichier PWA trouvé.");
        const currentState = await getCurrentState(owner, repo, branch, token);
        for (const f of Object.keys(targetState)) {
            const current = currentState[f];
            await restoreFile(owner, repo, f, targetState[f], current ? current.sha : null, branch, token, logRepo);
        }
        // Vérification non bloquante
        addLog(logRepo, "Vérification finale (cache possible)...", 'loading');
        let problems = 0;
        for (const f of Object.keys(targetState)) {
            await new Promise(r => setTimeout(r, 500));
            const after = await getFileAtCommit(owner, repo, f, branch, token);
            if (!after) { problems++; continue; }
            if (normalize(after.content) !== normalize(targetState[f])) {
                addLog(logRepo, `${f} : différé (cache GitHub)`, 'warning');
                problems++;
            } else {
                addLog(logRepo, `${f} vérifié ✓`, 'success');
            }
        }
        if (problems === 0) addLog(logRepo, "Rollback complet réussi.", 'success');
        else addLog(logRepo, `Rollback effectué (${problems} fichier(s) en cache). Attendez 1 min.`, 'warning');
        return true;
    }

    async function revertToPreviousCommit(owner, repo, defaultBranch) {
        const token = localStorage.getItem('hubcode_token');
        if (!token) { showNotification("Token manquant", "danger"); return; }
        clearTracker(repo);
        showTracker(repo);
        disableBackBtn(repo, true);
        setActivityState(true, `ROLLBACK ${repo}`);
        addLog(repo, `Début rollback pour ${owner}/${repo}`, 'step');

        try {
            addLog(repo, "Récupération des 6 derniers commits...", 'loading');
            const commitsResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/commits?per_page=6`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (!commitsResp.ok) throw new Error(`HTTP ${commitsResp.status}`);
            const commits = await commitsResp.json();
            if (commits.length < 2) throw new Error("Moins de 2 commits.");
            
            addLog(repo, "Analyse de l'état actuel...", 'loading');
            const currentState = await getCurrentState(owner, repo, defaultBranch, token);
            
            let targetCommit = null;
            for (let i = 1; i < commits.length; i++) {
                const c = commits[i];
                addLog(repo, `Comparaison avec commit ${c.sha.substring(0,7)} : "${c.commit.message.split('\n')[0].substring(0,40)}"`, 'step');
                let diffFound = false;
                for (const f of PWA_FILES) {
                    const targetFile = await getFileAtCommit(owner, repo, f, c.sha, token);
                    const currentFile = currentState[f];
                    const targetNorm = targetFile ? normalize(targetFile.content) : null;
                    const currentNorm = currentFile ? normalize(currentFile.content) : null;
                    if (targetNorm !== currentNorm) {
                        diffFound = true;
                        addLog(repo, `→ ${f} différent`, 'warning');
                    }
                }
                if (diffFound) {
                    targetCommit = c;
                    addLog(repo, `Commit ${c.sha.substring(0,7)} sélectionné.`, 'success');
                    break;
                } else {
                    addLog(repo, `Commit ${c.sha.substring(0,7)} : identique à l'actuel.`, 'warning');
                }
            }
            
            if (!targetCommit) {
                addLog(repo, "❌ Aucun commit antérieur différent trouvé.", 'error');
                addLog(repo, "👉 Le rollback n'est pas possible (tous identiques).", 'step');
                return;
            }
            
            await rollbackToCommit(owner, repo, defaultBranch, targetCommit.sha, token, repo);
            
            // Rebuild GitHub Pages
            addLog(repo, "Demande de reconstruction GitHub Pages...", 'loading');
            try {
                const rb = await fetch(`https://api.github.com/repos/${owner}/${repo}/pages/builds`, { method: 'POST', headers: { 'Authorization': `token ${token}` } });
                if (rb.ok) addLog(repo, "Rebuild déclenché ✓", 'success');
                else if (rb.status === 404) addLog(repo, "Pages non activé", 'warning');
                else addLog(repo, `Rebuild échoué (${rb.status})`, 'warning');
            } catch(e) { addLog(repo, "Rebuild non supporté", 'warning'); }
            
            // Polling
            addLog(repo, "Surveillance du déploiement (max 15x5s)...", 'loading');
            let deployed = false;
            for (let i=1; i<=15; i++) {
                await new Promise(r => setTimeout(r, 5000));
                addLog(repo, `Polling ${i}/15`, 'loading');
                const pages = await fetch(`https://api.github.com/repos/${owner}/${repo}/pages`, { headers: { 'Authorization': `token ${token}` } });
                if (pages.ok) {
                    const data = await pages.json();
                    if (data.status === 'built') { deployed = true; addLog(repo, "✅ Build terminé !", 'success'); break; }
                    else if (data.status === 'building') addLog(repo, "Build en cours...", 'loading');
                } else if (pages.status === 404) { addLog(repo, "Pages non activé", 'warning'); deployed = true; break; }
            }
            const url = `https://${owner.toLowerCase()}.github.io/${repo}/?t=${Date.now()}`;
            if (deployed) addLog(repo, `🎉 Rollback effectif ! Vérifiez : ${url}`, 'success');
            else addLog(repo, `⚠️ Code restauré mais déploiement lent. Ouvrez : ${url}`, 'warning');
            showNotification(`Rollback ${repo} terminé`, 'success');
        } catch(err) {
            addLog(repo, `ERREUR : ${err.message}`, 'error');
            showNotification(`Rollback échoué : ${err.message}`, 'danger');
        } finally {
            disableBackBtn(repo, false);
            setActivityState(false);
        }
    }

    // ---------- AUTRES FONCTIONS (copie, suppression, vue) ----------
    async function copyGitFile(owner, repo, filename) {
        const token = localStorage.getItem('hubcode_token');
        setActivityState(true, `COPIE ${filename}`);
        try {
            const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filename}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (!r.ok) throw new Error("Fichier introuvable");
            const d = await r.json();
            const content = b64ToUtf8(d.content);
            await navigator.clipboard.writeText(content);
            showNotification(`${filename.toUpperCase()} copié`, 'success');
        } catch(e) { showNotification(e.message, 'danger'); }
        finally { setActivityState(false); }
    }

    function viewLivePage(owner, repo) {
        window.open(`https://${owner.toLowerCase()}.github.io/${repo}/?t=${Date.now()}`, '_blank');
    }

    function showConfirmPanel(repoName) {
        document.getElementById(`confirm-${repoName}`).style.display = 'flex';
    }
    function hideConfirmPanel(repoName) {
        document.getElementById(`confirm-${repoName}`).style.display = 'none';
    }
    async function deleteRepository(owner, repoName) {
        const token = localStorage.getItem('hubcode_token');
        hideConfirmPanel(repoName);
        setActivityState(true, "SUPPRESSION");
        try {
            const r = await fetch(`https://api.github.com/repos/${owner}/${repoName}`, {
                method: 'DELETE', headers: { 'Authorization': `token ${token}` }
            });
            if (r.status === 204 || r.status === 240) {
                allRepositories = allRepositories.filter(rp => rp.name !== repoName);
                document.getElementById(`repo-${repoName}`)?.remove();
                showNotification(`Dépôt supprimé`, 'success');
            } else throw new Error("Droits insuffisants");
        } catch(e) { showNotification(e.message, 'danger'); }
        finally { setActivityState(false); }
    }

    // ---------- AFFICHAGE DE LA LISTE (avec bouton BACK) ----------
    function renderRepos(repos) {
        const container = document.getElementById('repoListContainer');
        container.innerHTML = "";
        if (repos.length === 0) {
            container.innerHTML = "<div style='text-align:center; color:#555; padding-top:20px;'>Aucun dépôt trouvé.</div>";
            return;
        }
        repos.forEach(repo => {
            const div = document.createElement('div');
            div.className = 'repo-item';
            div.id = `repo-${repo.name}`;
            div.innerHTML = `
                <div class="repo-header"><span>${repo.name}</span></div>
                <div class="repo-actions-row">
                    <button class="action-btn btn-html" onclick="playHum60Hz(); copyGitFile('${repo.owner.login}', '${repo.name}', 'index.html')">HTML</button>
                    <button class="action-btn btn-json" onclick="playHum60Hz(); copyGitFile('${repo.owner.login}', '${repo.name}', 'manifest.json')">JSON</button>
                    <button class="action-btn btn-sw" onclick="playHum60Hz(); copyGitFile('${repo.owner.login}', '${repo.name}', 'sw.js')">SW</button>
                    <button class="action-btn btn-view" onclick="playHum60Hz(); viewLivePage('${repo.owner.login}', '${repo.name}')">VIEW</button>
                    <button class="action-btn btn-back" onclick="playHum60Hz(); revertToPreviousCommit('${repo.owner.login}', '${repo.name}', '${repo.default_branch}')">BACK</button>
                    <button class="action-btn btn-sup" onclick="playHum60Hz(); showConfirmPanel('${repo.name}')">SUP</button>
                </div>
                <div class="confirm-panel" id="confirm-${repo.name}" style="display:none;">
                    <span style="color:var(--danger); font-weight:bold;">Supprimer définitivement ${repo.name} ?</span>
                    <div class="confirm-buttons">
                        <button class="confirm-btn" style="background:#f85149; color:white;" onclick="playHum60Hz(); deleteRepository('${repo.owner.login}', '${repo.name}')">CONFIRMER</button>
                        <button class="confirm-btn" style="background:#444; color:white;" onclick="playHum60Hz(); hideConfirmPanel('${repo.name}')">ANNULER</button>
                    </div>
                </div>
                <div class="tracker-terminal" id="tracker-${repo.name}"><div class="tracker-header"><span>⛁ ROLLBACK LOGS</span><span>⚡ temps réel</span></div></div>
            `;
            container.appendChild(div);
        });
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(e => console.log("SW not available")));
    }
</script>
