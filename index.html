<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hubcode — Repository Manager</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: {
                            900: '#0b0b0d',
                            800: '#0f0f11',
                            700: '#141418',
                            600: '#16161a',
                            500: '#1a1a1f',
                        },
                        cyber: {
                            violet: '#8b5cf6',
                            'violet-hover': '#7c3aed',
                            amber: '#f59e0b',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neu-dark': 'inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 12px rgba(0,0,0,0.6)',
                        'neu-pressed': 'inset 0 2px 4px rgba(0,0,0,0.6), inset 0 -1px 0 rgba(255,255,255,0.03)',
                        'glow-violet': '0 0 12px rgba(139,92,246,0.3), 0 0 24px rgba(139,92,246,0.1)',
                        'glow-amber': '0 0 8px rgba(245,158,11,0.3), 0 0 16px rgba(245,158,11,0.1)',
                    },
                    animation: {
                        'pulse-amber': 'pulse-amber 0.8s infinite alternate',
                        'flash-red': 'flash-red 0.4s infinite',
                        'spin-slow': 'spin 0.7s linear infinite',
                    },
                    keyframes: {
                        'pulse-amber': {
                            'from': { opacity: '0.4', transform: 'scale(0.9)' },
                            'to': { opacity: '1', transform: 'scale(1.1)' },
                        },
                        'flash-red': {
                            '0%, 100%': { backgroundColor: 'transparent', boxShadow: 'none', color: 'inherit' },
                            '50%': { backgroundColor: '#ef4444', boxShadow: '0 0 12px #ef4444', color: 'white' },
                        },
                        'spin': {
                            'to': { transform: 'rotate(360deg)' },
                        },
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: radial-gradient(ellipse at 50% 0%, #121218 0%, #0b0b0d 70%);
            letter-spacing: -0.01em;
            overscroll-behavior: none;
        }
        
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0f11;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 2px;
        }
        
        .btn-press {
            transition: all 0.12s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-press:active {
            transform: scale(0.96);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6), inset 0 -1px 0 rgba(255,255,255,0.03);
        }
        
        input:focus {
            box-shadow: 0 0 0 2px rgba(139,92,246,0.25), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        
        /* Tracker terminal compact */
        .tracker-terminal {
            font-family: 'JetBrains Mono', monospace;
        }
        .log-line {
            border-left: 2px solid transparent;
            padding: 2px 6px;
            border-radius: 3px;
            background: #0f0f13;
            font-size: 9px;
            word-break: break-word;
            line-height: 1.4;
        }
        .log-success { color: #4ade80; border-left-color: #4ade80; }
        .log-error { color: #f87171; border-left-color: #f87171; }
        .log-step { color: #818cf8; border-left-color: #818cf8; }
        .log-warning { color: #fb923c; border-left-color: #fb923c; }
        
        /* Mode UP actif */
        .btn-up-active {
            background: #4ade80 !important;
            color: #0b0b0d !important;
            box-shadow: 0 0 14px rgba(74,222,128,0.5), inset 0 0 4px rgba(255,255,255,0.4) !important;
            font-weight: 800 !important;
        }
        
        /* Toast */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .toast-enter {
            animation: slideIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Scroll area for repo list */
        .repo-scroll {
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0d">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="font-sans text-zinc-100 antialiased h-screen flex flex-col p-2 overflow-hidden">

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-3 right-2 left-2 z-[9999] flex flex-col gap-1.5 pointer-events-none"></div>

    <!-- Conteneur principal hauteur fixe -->
    <div class="w-full max-w-[500px] mx-auto flex flex-col h-full gap-2">

        <!-- En-tête ultra-compact -->
        <div class="flex items-center gap-2 flex-shrink-0 px-1">
            <div class="w-2 h-2 bg-cyber-violet rounded-full shadow-glow-violet animate-pulse"></div>
            <h1 class="text-base font-bold tracking-[0.12em] text-white uppercase">Hubcode</h1>
            <span class="ml-auto text-[8px] text-zinc-700 font-mono uppercase tracking-wider">Deploy</span>
        </div>

        <!-- Carte : Connexion compacte -->
        <div class="bg-deep-600/90 backdrop-blur-sm border border-zinc-800/60 rounded-xl p-3 shadow-neu-dark flex-shrink-0">
            <label class="block text-[10px] font-semibold uppercase tracking-[0.1em] text-zinc-500 mb-1.5 ml-0.5">
                GitHub Token
            </label>
            <div class="flex gap-2">
                <input type="password" id="githubToken" placeholder="Token secret..."
                       class="flex-1 bg-deep-700 border border-zinc-800/40 rounded-lg px-3 py-2.5 
                              text-cyber-amber font-mono text-xs placeholder-zinc-600
                              shadow-[inset_0_1px_3px_rgba(0,0,0,0.5)] 
                              focus:outline-none transition-all duration-200">
                <button class="btn-press px-4 py-2.5 bg-cyber-amber rounded-lg text-deep-900 font-bold text-[10px] uppercase tracking-[0.1em]
                               shadow-glow-amber hover:bg-amber-400 transition-all duration-200 flex items-center gap-1.5 flex-shrink-0"
                        onclick="playHum60Hz(); fetchRepositories()">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Charger
                </button>
            </div>
        </div>

        <!-- Carte : Liste des projets (zone scrollable) -->
        <div class="bg-deep-600/90 backdrop-blur-sm border border-zinc-800/60 rounded-xl p-3 shadow-neu-dark flex-1 flex flex-col min-h-0">
            
            <!-- Barre de statut ultra-compacte -->
            <div class="flex items-center justify-between mb-2 flex-shrink-0">
                <span class="text-[10px] font-semibold uppercase tracking-[0.1em] text-zinc-500">Projets</span>
                <div class="flex items-center gap-1.5">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)] transition-all duration-300" id="globalStatus"></div>
                    <span class="text-[8px] text-zinc-500 font-mono uppercase tracking-wider" id="statusText">PRÊT</span>
                </div>
            </div>

            <!-- Barre de recherche ultra-compacte -->
            <div class="relative mb-2 flex-shrink-0">
                <input type="text" id="repoSearch" placeholder="Rechercher..." oninput="filterRepositories()"
                       class="w-full bg-deep-700 border border-zinc-800/40 rounded-lg pl-8 pr-3 py-2 
                              text-zinc-200 text-xs placeholder-zinc-600
                              shadow-[inset_0_1px_3px_rgba(0,0,0,0.5)] 
                              focus:outline-none focus:border-cyber-violet/40 transition-all duration-200">
                <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-zinc-600 text-xs pointer-events-none">🔍</span>
            </div>

            <!-- Liste des repos scrollable -->
            <div id="repoListContainer" class="flex flex-col gap-2 flex-1 overflow-y-auto repo-scroll min-h-0">
                <!-- Rendu dynamique -->
            </div>
        </div>

        <!-- Signature ultra-compacte -->
        <div class="text-center flex-shrink-0 pb-1">
            <p class="text-[8px] text-zinc-800 tracking-[0.12em] font-medium uppercase">
                Made by Brahim Laiche <span class="text-zinc-700">2026</span> Paris
            </p>
        </div>
    </div>

    <script>
        // =============================================
        // LOGIQUE MÉTIER — STRICTEMENT PRÉSERVÉE
        // =============================================
        
        let allRepositories = [];
        let audioCtx = null;
        let upModeState = {};

        function b64ToUtf8(b64) {
            try {
                const binary = atob(b64.replace(/\s/g, ''));
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return new TextDecoder('utf-8').decode(bytes);
            } catch(e) {
                return decodeURIComponent(escape(atob(b64.replace(/\s/g, ''))));
            }
        }
        function utf8ToB64(str) {
            try {
                const bytes = new TextEncoder().encode(str);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                return btoa(binary);
            } catch(e) {
                return btoa(unescape(encodeURIComponent(str)));
            }
        }
        function normalize(s) { return s.replace(/\r\n/g, '\n').trim(); }

        function playHum60Hz() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 60;
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } catch(e) { console.warn(e); }
        }

        function showNotification(msg, type='success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const borderColor = type === 'success' ? 'border-emerald-500/50' : 'border-red-500/50';
            const textColor = type === 'success' ? 'text-emerald-400' : 'text-red-400';
            toast.className = `pointer-events-auto bg-deep-600/95 backdrop-blur-md border-l-4 ${borderColor} rounded-lg px-3 py-2 
                               text-[11px] font-semibold ${textColor} shadow-[0_6px_20px_rgba(0,0,0,0.7)] toast-enter
                               flex items-center justify-between`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(6px) scale(0.95)';
                toast.style.transition = 'all 0.2s ease';
                setTimeout(() => toast.remove(), 200);
            }, 3000);
        }

        window.onload = () => {
            const saved = localStorage.getItem('hubcode_token');
            if (saved) document.getElementById('githubToken').value = saved;
        };

        function setActivityState(active, msg="") {
            const dot = document.getElementById('globalStatus');
            const text = document.getElementById('statusText');
            if(active) {
                dot.className = "w-2 h-2 rounded-full bg-cyber-amber shadow-glow-amber animate-pulse-amber transition-all duration-300";
                text.innerText = msg || "BUSY";
                text.className = "text-[8px] text-cyber-amber font-mono uppercase tracking-wider";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)] transition-all duration-300";
                text.innerText = "PRÊT";
                text.className = "text-[8px] text-zinc-500 font-mono uppercase tracking-wider";
            }
        }

        async function fetchRepositories() {
            const token = document.getElementById('githubToken').value.trim();
            if(!token) { showNotification("Token requis", "danger"); return; }
            localStorage.setItem('hubcode_token', token);
            setActivityState(true, "LOAD");
            try {
                const response = await fetch('https://api.github.com/user/repos?per_page=100&sort=updated&direction=desc', {
                    headers: { 'Authorization': `token ${token}` }
                });
                if(!response.ok) throw new Error("Impossible de récupérer les dépôts");
                allRepositories = await response.json();
                document.getElementById('repoSearch').value = "";
                renderRepos(allRepositories);
            } catch(err) {
                showNotification(err.message, "danger");
            } finally {
                setActivityState(false);
            }
        }

        function filterRepositories() {
            const q = document.getElementById('repoSearch').value.toLowerCase();
            const filtered = allRepositories.filter(r => r.name.toLowerCase().includes(q));
            renderRepos(filtered);
        }

        function getTracker(repoName) {
            let el = document.getElementById(`tracker-${repoName}`);
            if (!el) {
                const repoDiv = document.getElementById(`repo-${repoName}`);
                if (repoDiv) {
                    const newTracker = document.createElement('div');
                    newTracker.id = `tracker-${repoName}`;
                    newTracker.className = 'tracker-terminal bg-deep-800 border border-cyber-amber/30 rounded-lg mt-2 p-2 text-[9px] font-mono text-zinc-400 shadow-[inset_0_1px_3px_rgba(0,0,0,0.5)] hidden flex-col gap-1 max-h-[140px] overflow-y-auto';
                    newTracker.innerHTML = `<div class="flex justify-between border-b border-zinc-800 pb-1.5 mb-1 font-bold text-[8px] text-cyber-amber uppercase tracking-wider"><span>⛁ Logs</span><span>⚡ live</span></div>`;
                    repoDiv.appendChild(newTracker);
                    el = newTracker;
                }
            }
            return el;
        }

        function showTracker(repoName) { const t = getTracker(repoName); if(t) t.style.display = 'flex'; }
        function clearTracker(repoName) { const t = getTracker(repoName); if(t) t.innerHTML = `<div class="flex justify-between border-b border-zinc-800 pb-1.5 mb-1 font-bold text-[8px] text-cyber-amber uppercase tracking-wider"><span>⛁ Logs</span><span>⚡ live</span></div>`; }
        function addLog(repoName, message, status = "step") {
            const t = getTracker(repoName);
            if (!t) return;
            const line = document.createElement('div');
            line.className = `log-line log-${status === 'error' ? 'error' : (status === 'success' ? 'success' : (status === 'warning' ? 'warning' : 'step'))}`;
            const time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            let sym = status === 'success' ? '✓' : (status === 'error' ? '✗' : (status === 'loading' ? '⟳' : '▶'));
            line.innerHTML = `<span class="text-zinc-600">[${time}]</span> ${sym} ${message}`;
            if (status === 'loading') line.innerHTML += `<span class="inline-block w-2 h-2 border border-cyber-amber/30 border-t-cyber-amber rounded-full animate-spin-slow ml-1.5 align-middle"></span>`;
            t.appendChild(line);
            t.scrollTop = t.scrollHeight;
        }
        function disableBackBtn(repoName, disabled) { const btn = document.querySelector(`#repo-${repoName} .btn-back`); if(btn) btn.disabled = disabled; }

        function toggleUpMode(buttonEl, repoName) {
            const isActive = upModeState[repoName] || false;
            if (isActive) {
                upModeState[repoName] = false;
                buttonEl.classList.remove('btn-up-active');
                addLog(repoName, "Mode UP désactivé", "warning");
            } else {
                upModeState[repoName] = true;
                buttonEl.classList.add('btn-up-active');
                addLog(repoName, "Mode UP activé", "success");
                showTracker(repoName);
            }
        }

        function disableUpModeForRepo(repoName) {
            if (upModeState[repoName]) {
                upModeState[repoName] = false;
                const upBtn = document.querySelector(`#repo-${repoName} .btn-up`);
                if (upBtn) upBtn.classList.remove('btn-up-active');
                addLog(repoName, "Mode UP désactivé auto", "warning");
            }
        }

        async function handleFileAction(owner, repo, filename, branch, buttonElement) {
            if (upModeState[repo]) {
                await pasteToGitFile(owner, repo, filename, branch, buttonElement);
            } else {
                await copyGitFile(owner, repo, filename);
            }
        }

        async function pasteToGitFile(owner, repo, filename, branch, buttonElement) {
            const token = localStorage.getItem('hubcode_token');
            if (!token) { showNotification("Token manquant", "danger"); return; }

            buttonElement.classList.add('animate-flash-red');
            setActivityState(true, "UP");
            showTracker(repo);
            addLog(repo, `UP: collage ${filename}...`, "step");

            try {
                addLog(repo, "Lecture presse-papiers...", "loading");
                let clipboardText = "";
                try {
                    clipboardText = await navigator.clipboard.readText();
                    if (!clipboardText || clipboardText.trim() === "") throw new Error("Presse-papiers vide");
                    addLog(repo, `Lu (${clipboardText.length}c)`, "success");
                } catch (err) {
                    throw new Error(`Échec lecture: ${err.message}`);
                }

                addLog(repo, `SHA de ${filename}...`, "loading");
                let currentSha = null;
                const getUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filename}?ref=${branch}`;
                const getResp = await fetch(getUrl, { headers: { 'Authorization': `token ${token}` } });
                if (getResp.status === 200) {
                    const data = await getResp.json();
                    currentSha = data.sha;
                    addLog(repo, `SHA ok`, "success");
                } else if (getResp.status === 404) {
                    addLog(repo, `Fichier nouveau`, "warning");
                } else {
                    throw new Error(`GET ${getResp.status}`);
                }

                const b64Content = utf8ToB64(clipboardText);
                addLog(repo, `Envoi...`, "loading");
                const putBody = { message: `Hubcode: UP ${filename}`, content: b64Content, branch: branch };
                if (currentSha) putBody.sha = currentSha;
                const putResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filename}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(putBody)
                });
                if (!putResp.ok) { const errData = await putResp.json(); throw new Error(errData.message || `PUT ${putResp.status}`); }
                addLog(repo, `✅ ${filename} OK`, "success");
                showNotification(`${filename} mis à jour`, "success");
            } catch (err) {
                addLog(repo, `ERREUR: ${err.message}`, "error");
                showNotification(`Échec: ${err.message}`, "danger");
            } finally {
                buttonElement.classList.remove('animate-flash-red');
                disableUpModeForRepo(repo);
                setActivityState(false);
            }
        }

        async function injectPwaToRepo(owner, repo, branch) {
            const token = localStorage.getItem('hubcode_token');
            if (!token) { showNotification("Token manquant", "danger"); return; }
            const logRepo = repo;
            clearTracker(logRepo);
            showTracker(logRepo);
            setActivityState(true, "INJECT");
            addLog(logRepo, `Injection PWA...`, 'step');

            try {
                addLog(logRepo, "Récup index.html...", 'loading');
                const getResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/index.html?ref=${branch}`, { headers: { 'Authorization': `token ${token}` } });
                let currentSha = null;
                let originalHtml = "";
                if (getResp.status === 200) {
                    const data = await getResp.json();
                    currentSha = data.sha;
                    originalHtml = b64ToUtf8(data.content);
                    addLog(logRepo, "Fichier récupéré", 'success');
                } else if (getResp.status === 404) {
                    originalHtml = `<!DOCTYPE html><html><head><title>${repo}</title></head><body><h1>${repo}</h1></body></html>`;
                    addLog(logRepo, "Création minimale", 'warning');
                } else { throw new Error(`HTTP ${getResp.status}`); }

                const headElements = `\n<link rel="manifest" href="./manifest.json">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<meta name="theme-color" content="#4b6cb7">\n<meta name="apple-mobile-web-app-capable" content="yes">\n<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">\n<link rel="apple-touch-icon" href="icon.png">`;
                const swScript = `\n<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}<\/script>\n`;
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(originalHtml, 'text/html');
                if (doc.head) doc.head.insertAdjacentHTML('beforeend', headElements);
                else doc.documentElement.insertAdjacentHTML('afterbegin', '<head>' + headElements + '</head>');
                if (doc.body) doc.body.insertAdjacentHTML('beforeend', swScript);
                else doc.documentElement.insertAdjacentHTML('beforeend', '<body>' + swScript + '</body>');
                
                let updatedHtml = doc.documentElement.outerHTML;
                if (!originalHtml.toLowerCase().includes('<!doctype html>')) updatedHtml = '<!DOCTYPE html>\n' + updatedHtml;

                const b64Content = utf8ToB64(updatedHtml);
                addLog(logRepo, "Balises injectées", 'success');
                addLog(logRepo, "Envoi...", 'loading');
                
                const putBody = { message: "Hubcode: injection PWA", content: b64Content, branch: branch };
                if (currentSha) putBody.sha = currentSha;
                const putResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/index.html`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(putBody)
                });
                if (!putResp.ok) { const errData = await putResp.json(); throw new Error(errData.message || "Erreur mise à jour"); }
                addLog(logRepo, "✅ Injection OK", 'success');
                showNotification(`PWA injectée`, 'success');
            } catch (err) {
                addLog(logRepo, `ERREUR: ${err.message}`, 'error');
                showNotification(`Échec: ${err.message}`, 'danger');
            } finally { setActivityState(false); }
        }

        function showInjectConfirmPanel(repoName) { hideRollbackConfirmPanel(repoName); hideConfirmPanel(repoName); const p = document.getElementById(`confirm-inject-${repoName}`); if(p) p.style.display = 'flex'; }
        function hideInjectConfirmPanel(repoName) { const p = document.getElementById(`confirm-inject-${repoName}`); if(p) p.style.display = 'none'; }

        const PWA_FILES = ['index.html', 'manifest.json', 'sw.js', 'icon.png'];

        async function getFileAtCommit(owner, repo, file, commitSha, token) {
            try { const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}?ref=${commitSha}`, { headers: { 'Authorization': `token ${token}` } }); if (!r.ok) return null; const d = await r.json(); return { content: b64ToUtf8(d.content), sha: d.sha }; } catch { return null; }
        }

        async function getCurrentState(owner, repo, branch, token) {
            const state = {};
            for (const f of PWA_FILES) {
                try { const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${f}?ref=${branch}`, { headers: { 'Authorization': `token ${token}` } }); if (r.ok) { const d = await r.json(); state[f] = { content: b64ToUtf8(d.content), sha: d.sha }; } else if (r.status === 404) state[f] = null; } catch(e) {}
            }
            return state;
        }

        async function restoreFile(owner, repo, file, targetContent, currentSha, branch, token, logRepo) {
            addLog(logRepo, `${file}...`, 'loading');
            const b64 = utf8ToB64(targetContent);
            const body = { message: `Hubcode: restore ${file}`, content: b64, branch };
            if (currentSha) body.sha = currentSha;
            const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if (!r.ok) throw new Error(`PUT ${file} (${r.status})`);
            addLog(logRepo, `${file} ✓`, 'success');
            await new Promise(resolve => setTimeout(resolve, 800));
            return true;
        }

        async function rollbackToCommit(owner, repo, branch, targetSha, token, logRepo) {
            addLog(logRepo, `Rollback → ${targetSha.substring(0,7)}`, 'step');
            const targetState = {};
            for (const f of PWA_FILES) { const fc = await getFileAtCommit(owner, repo, f, targetSha, token); if (fc) targetState[f] = fc.content; }
            if (Object.keys(targetState).length === 0) throw new Error("Aucun fichier PWA");
            const currentState = await getCurrentState(owner, repo, branch, token);
            for (const f of Object.keys(targetState)) { const current = currentState[f]; await restoreFile(owner, repo, f, targetState[f], current ? current.sha : null, branch, token, logRepo); }
            addLog(logRepo, "Rollback OK", 'success');
            return true;
        }

        async function revertToPreviousCommit(owner, repo, defaultBranch) {
            const token = localStorage.getItem('hubcode_token');
            if (!token) { showNotification("Token manquant", "danger"); return; }
            clearTracker(repo); showTracker(repo); disableBackBtn(repo, true);
            setActivityState(true, "ROLLBACK");
            addLog(repo, `Début rollback`, 'step');
            try {
                addLog(repo, "Récup commits...", 'loading');
                const commitsResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/commits?per_page=6`, { headers: { 'Authorization': `token ${token}` } });
                if (!commitsResp.ok) throw new Error(`HTTP ${commitsResp.status}`);
                const commits = await commitsResp.json();
                if (commits.length < 2) throw new Error("Moins de 2 commits");
                const currentState = await getCurrentState(owner, repo, defaultBranch, token);
                let targetCommit = null;
                for (let i = 1; i < commits.length; i++) {
                    const c = commits[i]; let diffFound = false;
                    for (const f of PWA_FILES) { const tf = await getFileAtCommit(owner, repo, f, c.sha, token); const cf = currentState[f]; if ((tf?normalize(tf.content):null) !== (cf?normalize(cf.content):null)) { diffFound = true; break; } }
                    if (diffFound) { targetCommit = c; addLog(repo, `Cible: ${c.sha.substring(0,7)}`, 'success'); break; }
                }
                if (!targetCommit) { addLog(repo, "Aucun diff", 'error'); return; }
                await rollbackToCommit(owner, repo, defaultBranch, targetCommit.sha, token, repo);
                try { await fetch(`https://api.github.com/repos/${owner}/${repo}/pages/builds`, { method: 'POST', headers: { 'Authorization': `token ${token}` } }); } catch(e) {}
                let deployed = false;
                for (let i=1; i<=10; i++) { await new Promise(r => setTimeout(r, 4000)); const pages = await fetch(`https://api.github.com/repos/${owner}/${repo}/pages`, { headers: { 'Authorization': `token ${token}` } }); if (pages.ok && (await pages.json()).status === 'built') { deployed = true; break; } }
                if (deployed) addLog(repo, "✅ Déployé", 'success'); else addLog(repo, "⚠️ En cours", 'warning');
                showNotification(`Rollback OK`, 'success');
            } catch(err) { addLog(repo, `ERREUR: ${err.message}`, 'error'); showNotification(`Échec: ${err.message}`, 'danger'); }
            finally { disableBackBtn(repo, false); setActivityState(false); }
        }

        function showRollbackConfirmPanel(repoName) { hideInjectConfirmPanel(repoName); hideConfirmPanel(repoName); const p = document.getElementById(`confirm-rollback-${repoName}`); if(p) p.style.display = 'flex'; }
        function hideRollbackConfirmPanel(repoName) { const p = document.getElementById(`confirm-rollback-${repoName}`); if(p) p.style.display = 'none'; }
        function showConfirmPanel(repoName) { hideRollbackConfirmPanel(repoName); hideInjectConfirmPanel(repoName); const p = document.getElementById(`confirm-${repoName}`); if(p) p.style.display = 'flex'; }
        function hideConfirmPanel(repoName) { const p = document.getElementById(`confirm-${repoName}`); if(p) p.style.display = 'none'; }
        async function confirmedRollback(owner, repo, defaultBranch) { hideRollbackConfirmPanel(repo); await revertToPreviousCommit(owner, repo, defaultBranch); }
        async function confirmedInject(owner, repo, branch) { hideInjectConfirmPanel(repo); await injectPwaToRepo(owner, repo, branch); }
        
        async function deleteRepository(owner, repoName) {
            const token = localStorage.getItem('hubcode_token');
            hideConfirmPanel(repoName); setActivityState(true, "DEL");
            try {
                const r = await fetch(`https://api.github.com/repos/${owner}/${repoName}`, { method: 'DELETE', headers: { 'Authorization': `token ${token}` } });
                if (r.status === 204 || r.status === 240) { allRepositories = allRepositories.filter(rp => rp.name !== repoName); document.getElementById(`repo-${repoName}`)?.remove(); showNotification(`Supprimé`, 'success'); }
                else throw new Error("Droits insuffisants");
            } catch(e) { showNotification(e.message, 'danger'); }
            finally { setActivityState(false); }
        }

        async function copyGitFile(owner, repo, filename) {
            const token = localStorage.getItem('hubcode_token');
            setActivityState(true, "COPY");
            try {
                const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filename}`, { headers: { 'Authorization': `token ${token}` } });
                if (!r.ok) throw new Error("Fichier introuvable");
                const content = b64ToUtf8((await r.json()).content);
                await navigator.clipboard.writeText(content);
                showNotification(`${filename.toUpperCase()} copié`, 'success');
            } catch(e) { showNotification(e.message, 'danger'); }
            finally { setActivityState(false); }
        }

        function viewLivePage(owner, repo) { window.open(`https://${owner.toLowerCase()}.github.io/${repo}/?t=${Date.now()}`, '_blank'); }

        function renderRepos(repos) {
            const container = document.getElementById('repoListContainer');
            container.innerHTML = "";
            if (repos.length === 0) { container.innerHTML = `<div class="text-center text-zinc-600 py-6 text-[11px] font-medium">Aucun dépôt trouvé.</div>`; return; }
            repos.forEach(repo => {
                const div = document.createElement('div');
                div.className = 'bg-deep-500/90 border border-zinc-800/60 rounded-xl p-2.5 shadow-neu-dark transition-all duration-200 flex-shrink-0';
                div.id = `repo-${repo.name}`;
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-1.5 min-w-0 flex-1 mr-2">
                            <span class="w-1.5 h-1.5 bg-cyber-amber rounded-full shadow-glow-amber flex-shrink-0"></span>
                            <span class="font-mono font-bold text-zinc-200 text-[11px] tracking-wide truncate">${repo.name}</span>
                        </div>
                        <span class="text-[8px] text-zinc-600 font-mono flex-shrink-0">${repo.default_branch}</span>
                    </div>
                    <div class="grid grid-cols-4 gap-1.5">
                        <button class="btn-press col-span-2 py-2 bg-cyber-amber/10 border border-cyber-amber/30 rounded-lg 
                                       text-cyber-amber font-bold text-[9px] uppercase tracking-wider
                                       hover:bg-cyber-amber/20 transition-all duration-200 btn-inject"
                                onclick="playHum60Hz(); showInjectConfirmPanel('${repo.name}')">💉 Inject</button>
                        <button class="btn-press col-span-2 py-2 bg-deep-600 border border-zinc-700/40 rounded-lg 
                                       text-zinc-400 font-bold text-[9px] uppercase tracking-wider
                                       hover:text-white transition-all duration-200 btn-up"
                                onclick="playHum60Hz(); toggleUpMode(this, '${repo.name}')">UP</button>
                        <button class="btn-press py-2 bg-deep-600 border border-zinc-700/40 rounded-lg 
                                       text-cyber-violet font-bold text-[9px] uppercase tracking-wider
                                       hover:bg-cyber-violet/10 hover:text-white transition-all duration-200"
                                onclick="playHum60Hz(); handleFileAction('${repo.owner.login}', '${repo.name}', 'index.html', '${repo.default_branch}', this)">HTML</button>
                        <button class="btn-press py-2 bg-deep-600 border border-zinc-700/40 rounded-lg 
                                       text-cyber-amber font-bold text-[9px] uppercase tracking-wider
                                       hover:bg-cyber-amber/10 hover:text-white transition-all duration-200"
                                onclick="playHum60Hz(); handleFileAction('${repo.owner.login}', '${repo.name}', 'manifest.json', '${repo.default_branch}', this)">JSON</button>
                        <button class="btn-press py-2 bg-deep-600 border border-zinc-700/40 rounded-lg 
                                       text-emerald-400 font-bold text-[9px] uppercase tracking-wider
                                       hover:bg-emerald-500/10 hover:text-white transition-all duration-200"
                                onclick="playHum60Hz(); handleFileAction('${repo.owner.login}', '${repo.name}', 'sw.js', '${repo.default_branch}', this)">SW</button>
                        <button class="btn-press py-2 bg-deep-600 border border-zinc-700/40 rounded-lg 
                                       text-white font-bold text-[9px] uppercase tracking-wider
                                       hover:bg-zinc-600 transition-all duration-200"
                                onclick="playHum60Hz(); viewLivePage('${repo.owner.login}', '${repo.name}')">View</button>
                    </div>
                    <div class="grid grid-cols-2 gap-1.5 mt-1.5">
                        <button class="btn-press py-2 bg-deep-600 border border-zinc-700/40 rounded-lg 
                                       text-orange-400 font-bold text-[9px] uppercase tracking-wider
                                       hover:bg-orange-500/10 hover:text-white transition-all duration-200 btn-back"
                                onclick="playHum60Hz(); showRollbackConfirmPanel('${repo.name}')">Back</button>
                        <button class="btn-press py-2 bg-deep-600 border border-zinc-700/40 rounded-lg 
                                       text-red-400 font-bold text-[9px] uppercase tracking-wider
                                       hover:bg-red-500/10 hover:text-white transition-all duration-200 btn-sup"
                                onclick="playHum60Hz(); showConfirmPanel('${repo.name}')">Sup</button>
                    </div>
                    
                    <div class="hidden flex-col gap-2 bg-deep-700/90 border border-cyber-amber/40 rounded-lg p-2.5 mt-2 text-center text-[10px]" id="confirm-inject-${repo.name}">
                        <span class="text-cyber-amber font-bold text-[10px]">🔧 Injecter PWA ?</span>
                        <div class="flex gap-2">
                            <button class="btn-press flex-1 py-2 bg-cyber-amber rounded-lg text-deep-900 font-bold text-[9px] uppercase tracking-wider" onclick="playHum60Hz(); confirmedInject('${repo.owner.login}', '${repo.name}', '${repo.default_branch}')">Oui</button>
                            <button class="btn-press flex-1 py-2 bg-zinc-700 rounded-lg text-white font-bold text-[9px] uppercase tracking-wider" onclick="playHum60Hz(); hideInjectConfirmPanel('${repo.name}')">Non</button>
                        </div>
                    </div>
                    
                    <div class="hidden flex-col gap-2 bg-deep-700/90 border border-orange-500/40 rounded-lg p-2.5 mt-2 text-center text-[10px]" id="confirm-rollback-${repo.name}">
                        <span class="text-orange-400 font-bold text-[10px]">⚠️ Rollback ?</span>
                        <div class="flex gap-2">
                            <button class="btn-press flex-1 py-2 bg-red-500 rounded-lg text-white font-bold text-[9px] uppercase tracking-wider" onclick="playHum60Hz(); confirmedRollback('${repo.owner.login}', '${repo.name}', '${repo.default_branch}')">Oui</button>
                            <button class="btn-press flex-1 py-2 bg-zinc-700 rounded-lg text-white font-bold text-[9px] uppercase tracking-wider" onclick="playHum60Hz(); hideRollbackConfirmPanel('${repo.name}')">Non</button>
                        </div>
                    </div>
                    
                    <div class="hidden flex-col gap-2 bg-deep-700/90 border border-red-500/40 rounded-lg p-2.5 mt-2 text-center text-[10px]" id="confirm-${repo.name}">
                        <span class="text-red-400 font-bold text-[10px]">Supprimer ?</span>
                        <div class="flex gap-2">
                            <button class="btn-press flex-1 py-2 bg-red-500 rounded-lg text-white font-bold text-[9px] uppercase tracking-wider" onclick="playHum60Hz(); deleteRepository('${repo.owner.login}', '${repo.name}')">Oui</button>
                            <button class="btn-press flex-1 py-2 bg-zinc-700 rounded-lg text-white font-bold text-[9px] uppercase tracking-wider" onclick="playHum60Hz(); hideConfirmPanel('${repo.name}')">Non</button>
                        </div>
                    </div>
                    
                    <div class="tracker-terminal bg-deep-800 border border-cyber-amber/30 rounded-lg mt-2 p-2 text-[9px] font-mono text-zinc-400 shadow-[inset_0_1px_3px_rgba(0,0,0,0.5)] hidden flex-col gap-1 max-h-[140px] overflow-y-auto" id="tracker-${repo.name}">
                        <div class="flex justify-between border-b border-zinc-800 pb-1.5 mb-1 font-bold text-[8px] text-cyber-amber uppercase tracking-wider"><span>⛁ Logs</span><span>⚡ live</span></div>
                    </div>
                `;
                container.appendChild(div);
                if (upModeState[repo.name]) { const upBtn = div.querySelector('.btn-up'); if (upBtn) upBtn.classList.add('btn-up-active'); }
            });
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(e => console.log("SW not available"))); }
    </script>

    <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').then(reg=>console.log('SW ok')).catch(err=>console.error('SW err',err));});}</script>
