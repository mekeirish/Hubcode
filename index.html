<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hubcode - Repository Manager</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { 
            --bg: #1e1e22; 
            --card-bg: #1e1e22; 
            --shadow-dark: #111113; 
            --shadow-light: #2b2b31; 
            --accent: #ffca28; 
            --text: #c9d1d9; 
            --danger: #f85149; 
            --success: #7ee787; 
            --blue: #58a6ff;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            padding: 15px; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); 
            border: none; 
            margin-bottom: 20px; 
        }
        
        h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-top: 0; }
        
        input { 
            width: 100%; 
            margin: 8px 0; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: var(--bg); 
            color: white; 
            box-sizing: border-box; 
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); 
            outline: none;
            font-size: 13px;
        }

        /* Style de recherche spécifique */
        .search-box {
            margin: 12px 0 4px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Système d'alerte interne flottant chirurgical (N'affecte pas le layout) */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            left: 20px; /* Aligné pour les écrans tactiles mobiles */
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
            pointer-events: none; /* Laisse passer les clics en dessous si nécessaire */
        }

        /* Ajustement pour grands écrans / desktops */
        @media (min-width: 440px) {
            .toast-container {
                left: auto;
                width: 360px;
            }
        }

        .internal-toast {
            pointer-events: auto; /* Active les interactions sur le toast lui-même */
            background: linear-gradient(135deg, #16161a, #111113);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            padding: 14px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 2px 2px 4px var(--shadow-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .internal-toast.success-toast { border-left-color: var(--success); }
        .internal-toast.danger-toast { border-left-color: var(--danger); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* Boutons principaux au look Skeuomorphique */
        button.btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 8px; 
            transition: all 0.1s ease; 
            background: linear-gradient(135deg, #2b2b31, #1b1b1f); 
            box-shadow: 4px 4px 8px var(--shadow-dark), 
                        -4px -4px 8px var(--shadow-light),
                        inset 1px 1px 1px rgba(255, 255, 255, 0.1); 
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }
        
        button.btn:active { 
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light); 
            transform: translateY(1px); 
        }
        
        .yellow-btn { color: var(--accent); border-bottom: 2px solid rgba(255, 202, 40, 0.2) !important; }
        .red-btn { color: var(--danger); border-bottom: 2px solid rgba(248, 81, 73, 0.2) !important; }
        
        /* Liste des dépôts */
        .repo-list {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .repo-item {
            background: var(--card-bg);
            padding: 14px;
            border-radius: 14px;
            box-shadow: 4px 4px 8px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .repo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
            color: #fff;
        }
        
        /* Ligne unique d'actions optimisée mobile */
        .repo-actions-row {
            display: flex;
            gap: 6px;
            width: 100%;
            overflow-x: auto; /* Permet le glissement horizontal fluide si l'écran est très petit */
            padding-bottom: 4px;
        }
        
        /* Boutons d'action au look Skeuomorphique */
        .action-btn {
            flex: 1;
            min-width: 52px;
            padding: 11px 4px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            background: linear-gradient(135deg, #26262b, #16161a);
            color: var(--text);
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 2px 2px 4px var(--shadow-dark), 
                        -1px -1px 2px var(--shadow-light),
                        inset 1px 1px 0px rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: all 0.05s ease;
        }
        
        .action-btn:active {
            box-shadow: inset 2px 2px 4px var(--shadow-dark);
            transform: translateY(1px);
        }
        
        .btn-html { color: var(--blue); border-bottom: 2px solid rgba(88, 166, 255, 0.3); }
        .btn-json { color: var(--accent); border-bottom: 2px solid rgba(255, 202, 40, 0.3); }
        .btn-sw { color: var(--success); border-bottom: 2px solid rgba(126, 231, 135, 0.3); }
        .btn-view { color: #fff; background: linear-gradient(135deg, #4a4a54, #2a2a30); border-bottom: 2px solid rgba(255, 255, 255, 0.2); }
        .btn-sup { color: var(--danger); border-bottom: 2px solid rgba(248, 81, 73, 0.3); }
        
        /* Télémétrie d'activité */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .dot-idle { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-active { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: blink 0.8s infinite alternate; }
        
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }
        
        /* Bandeau de confirmation interne sécurisé (Zéro Popup) */
        .confirm-panel {
            background: #1a1a1d;
            border: 1px solid var(--danger);
            border-radius: 12px;
            padding: 12px;
            margin-top: 8px;
            display: none;
            flex-direction: column;
            gap: 8px;
            text-align: center;
            font-size: 12px;
        }
        
        .confirm-buttons {
            display: flex;
            gap: 10px;
        }
        
        /* Boutons de confirmation skeuomorphiques */
        .confirm-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 7px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            box-shadow: 2px 2px 4px var(--shadow-dark), inset 1px 1px 0px rgba(255, 255, 255, 0.1);
            transition: all 0.05s ease;
        }

        .confirm-btn:active {
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.5);
            transform: translateY(1px);
        }
        
        .signature {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: auto;
            padding-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>

<body>

    <!-- Structure flottante globale pour les toasts -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="card">
        <h2>Hubcode</h2>
        <input type="password" id="githubToken" placeholder="Entre ton GitHub Token secret...">
        <button class="btn yellow-btn" onclick="playHum60Hz(); fetchRepositories()">🔄 CHARGER LES DEPÔTS</button>
    </div>

    <div class="card" style="flex: 1;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <span style="font-size: 0.75rem; text-transform: uppercase; color: #888; letter-spacing: 1px;">Liste des projets</span>
            <div style="display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666;">
                <span class="status-dot dot-idle" id="globalStatus"></span> <span id="statusText">PRÊT</span>
            </div>
        </div>

        <!-- Nouveau champ de recherche dynamique -->
        <input type="text" id="repoSearch" class="search-box" placeholder="🔍 Rechercher un dépôt..." oninput="filterRepositories()">
        
        <div class="repo-list" id="repoListContainer">
            <!-- Les lignes de dépôts s'injecteront ici -->
        </div>
    </div>

    <div class="signature">Made by Brahim Laiche 2026 Paris</div>

<script>
    // Stockage local global pour le filtrage en temps réel
    let allRepositories = [];
    let audioCtx = null;

    // --- Générateur audio natif : Hum Réseau 60Hz brute (Sine @ 60Hz, Gate 300ms) ---
    function playHum60Hz() {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(60, audioCtx.currentTime); // 60Hz stable brute
            
            // Enveloppe Gate stricte de 300ms (Attaque instantanée, maintient, coupure propre)
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime + 0.28);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3); 
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } catch (e) {
            console.error("AudioContext non initialisé ou bloqué par le navigateur", e);
        }
    }

    // --- Gestionnaire de notifications flottantes ---
    function showNotification(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `internal-toast ${type}-toast`;
        toast.innerText = message;
        
        container.appendChild(toast);
        
        // Auto-destruction propre après 3.5 secondes
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(10px) scale(0.95)';
            toast.style.transition = 'all 0.25s ease-out';
            setTimeout(() => toast.remove(), 250);
        }, 3500);
    }

    // --- Persistance automatique du token ---
    window.onload = function() {
        const savedToken = localStorage.getItem('hubcode_token');
        if (savedToken) {
            document.getElementById('githubToken').value = savedToken;
        }
    };

    // --- Gestion globale de l'état d'activité des voyants ---
    function setActivityState(isActive, message = "") {
        const dot = document.getElementById('globalStatus');
        const text = document.getElementById('statusText');
        if(isActive) {
            dot.className = "status-dot dot-active";
            text.innerText = message || "TRAITEMENT GITHUB...";
            text.style.color = "var(--accent)";
        } else {
            dot.className = "status-dot dot-idle";
            text.innerText = "PRÊT";
            text.style.color = "#666";
        }
    }

    // --- Récupération des dépôts depuis GitHub API ---
    async function fetchRepositories() {
        const token = document.getElementById('githubToken').value.trim();
        if(!token) { showNotification("Token manquant", "danger"); return; }
        
        localStorage.setItem('hubcode_token', token);
        setActivityState(true, "CHARGEMENT...");

        try {
            const response = await fetch('https://api.github.com/user/repos?per_page=100&sort=updated', {
                headers: { 'Authorization': `token ${token}` }
            });
            if(!response.ok) throw new Error("Impossible de récupérer les dépôts");
            
            allRepositories = await response.json();
            document.getElementById('repoSearch').value = "";
            renderRepos(allRepositories);
        } catch (err) {
            showNotification(err.message, "danger");
        } finally {
            setActivityState(false);
        }
    }

    // --- Filtrage dynamique au clavier ---
    function filterRepositories() {
        const query = document.getElementById('repoSearch').value.toLowerCase().trim();
        const filtered = allRepositories.filter(repo => repo.name.toLowerCase().includes(query));
        renderRepos(filtered);
    }

    // --- Injection HTML des éléments en ligne ---
    function renderRepos(repos) {
        const container = document.getElementById('repoListContainer');
        container.innerHTML = "";
        
        if(repos.length === 0) {
            container.innerHTML = "<div style='text-align:center; color:#555; padding-top:20px;'>Aucun dépôt trouvé.</div>";
            return;
        }

        repos.forEach(repo => {
            const repoRow = document.createElement('div');
            repoRow.className = 'repo-item';
            repoRow.id = `repo-${repo.name}`;
            
            repoRow.innerHTML = `
                <div class="repo-header">
                    <span>${repo.name}</span>
                </div>
                <!-- Une seule ligne d'actions chirurgicale -->
                <div class="repo-actions-row">
                    <button class="action-btn btn-html" onclick="playHum60Hz(); copyGitFile('${repo.owner.login}', '${repo.name}', 'index.html')">HTML</button>
                    <button class="action-btn btn-json" onclick="playHum60Hz(); copyGitFile('${repo.owner.login}', '${repo.name}', 'manifest.json')">JSON</button>
                    <button class="action-btn btn-sw" onclick="playHum60Hz(); copyGitFile('${repo.owner.login}', '${repo.name}', 'sw.js')">SW</button>
                    <button class="action-btn btn-view" onclick="playHum60Hz(); viewLivePage('${repo.owner.login}', '${repo.name}')">VIEW</button>
                    <button class="action-btn btn-sup" onclick="playHum60Hz(); showConfirmPanel('${repo.name}')">SUP</button>
                </div>
                
                <!-- Panneau de confirmation interne et sécurisé (Pas de popup) -->
                <div class="confirm-panel" id="confirm-${repo.name}">
                    <span style="color:var(--danger); font-weight:bold;">Supprimer définitivement ${repo.name} ?</span>
                    <div class="confirm-buttons">
                        <button class="confirm-btn" style="background:linear-gradient(135deg, #f85149, #bd2c26); color:white;" onclick="playHum60Hz(); deleteRepository('${repo.owner.login}', '${repo.name}')">CONFIRMER</button>
                        <button class="confirm-btn" style="background:linear-gradient(135deg, #444, #222); color:white;" onclick="playHum60Hz(); hideConfirmPanel('${repo.name}')">ANNULER</button>
                    </div>
                </div>
            `;
            container.appendChild(repoRow);
        });
    }

    // --- Extraction et copie d'un fichier à la source ---
    async function copyGitFile(owner, repo, filename) {
        const token = localStorage.getItem('hubcode_token');
        setActivityState(true, `RECUPÉRATION ${filename.toUpperCase()}...`);
        
        try {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filename}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            if(!response.ok) throw new Error(`Fichier ${filename} introuvable.`);
            
            const data = await response.json();
            const cleanContent = decodeURIComponent(escape(atob(data.content)));
            
            await navigator.clipboard.writeText(cleanContent);
            showNotification(`${filename.toUpperCase()} copié avec succès !`, "success");
        } catch (err) {
            showNotification(err.message, "danger");
        } finally {
            setActivityState(false);
        }
    }

    // --- Redirection Directe vers le Rendu de Production ---
    function viewLivePage(owner, repo) {
        const cleanUser = owner.toLowerCase();
        const cleanRepo = repo; 
        const liveUrl = `https://${cleanUser}.github.io/${cleanRepo}/`;
        window.open(liveUrl, '_blank');
    }

    // --- Gestion Interne du Module de Suppression Éco-responsable (Sans Popup) ---
    function showConfirmPanel(repoName) {
        document.getElementById(`confirm-${repoName}`).style.display = 'flex';
    }

    function hideConfirmPanel(repoName) {
        document.getElementById(`confirm-${repoName}`).style.display = 'none';
    }

    async function deleteRepository(owner, repoName) {
        const token = localStorage.getItem('hubcode_token');
        hideConfirmPanel(repoName);
        setActivityState(true, "SUPPRESSION REPO...");

        try {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}`, {
                method: 'DELETE',
                headers: { 'Authorization': `token ${token}` }
            });
            
            if (response.status === 240 || response.status === 204) {
                allRepositories = allRepositories.filter(r => r.name !== repoName);
                const element = document.getElementById(`repo-${repoName}`);
                if(element) element.remove();
                showNotification(`Le dépôt ${repoName} a été supprimé.`, "success");
            } else {
                throw new Error("Droits insuffisants (Vérifie la portée 'delete_repo').");
            }
        } catch (err) {
            showNotification(err.message, "danger");
        } finally {
            setActivityState(false);
        }
    }
</script>

<script>
    if('serviceWorker' in navigator){
        window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
    }
</script>
